version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: massage-parlor-db
    environment:
      POSTGRES_DB: massage_parlor_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../assignments/database/massage_salon.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d massage_parlor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: massage-parlor-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/massage_parlor_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET:-AMxmyFp3O9I82Zc44ppw9eCW8u75+oIv4u7dENqjyCZRcvo1gRvptjFHkXGkfHUl}

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

