apiVersion: 1
contactPoints:
  - orgId: 1
    name: telegram-alerts
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN}'
          chatid: '5447547163'
          message: |
            {{ .CommonLabels.alertname }}
            
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: true
